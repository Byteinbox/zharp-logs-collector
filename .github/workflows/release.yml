name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: dist/go.mod
          cache-dependency-path: dist/go.sum

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd dist
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "../zharp-collector-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            .

      - name: Package (tar.gz for unix, raw exe for windows)
        run: |
          BINARY="zharp-collector-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            VERSIONED="zharp-collector-${{ github.ref_name }}-windows-amd64.exe"
            mv "${BINARY}" "${VERSIONED}"
            echo "ASSET=${VERSIONED}" >> $GITHUB_ENV
          else
            ARCHIVE="zharp-collector-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
            tar -czf "${ARCHIVE}" "${BINARY}"
            echo "ASSET=${ARCHIVE}" >> $GITHUB_ENV
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux-amd64
          path: artifacts/linux-amd64/

      - uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: artifacts/linux-arm64/

      - name: Extract pre-built binaries into build context
        run: |
          tar -xzf artifacts/linux-amd64/*.tar.gz zharp-collector-linux-amd64
          tar -xzf artifacts/linux-arm64/*.tar.gz zharp-collector-linux-arm64
          chmod +x zharp-collector-linux-amd64 zharp-collector-linux-arm64

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
          pattern: "{linux,darwin,windows}-{amd64,arm64}"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**
            setup.ps1
            install.sh
          generate_release_notes: true
