## Zharp Collector — starter config template
## Run the guided installer to auto-generate this for your server:
##   curl -sSL https://raw.githubusercontent.com/Byteinbox/zharp-logs-collector/main/install.sh | sudo bash
##
## Or edit manually. Full reference:
##   https://github.com/Byteinbox/zharp-logs-collector#configuration

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  # Host metrics — always recommended
  hostmetrics:
    collection_interval: 60s
    scrapers:
      cpu:
      memory:
      disk:
      network:
      load:

  # Tail log files — add your own paths here
  # filelog:
  #   include:
  #     - /var/log/nginx/access.log
  #     - /var/log/myapp/*.log
  #   include_file_path: true

processors:
  batch:
    send_batch_size: 500
    timeout: 5s
  memory_limiter:
    limit_mib: 128
    spike_limit_mib: 32
    check_interval: 5s
  resourcedetection:
    detectors: [system, env]
    timeout: 5s

exporters:
  zharp:
    api_key: "${env:ZHARP_API_KEY}"

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [hostmetrics]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [zharp]
    # Uncomment when you add filelog above:
    # logs:
    #   receivers: [filelog]
    #   processors: [memory_limiter, resourcedetection, batch]
    #   exporters: [zharp]
