# Zharp Collector — Docker Swarm Stack
# Runs one collector per Swarm node (global mode) — logs from every container
# on every node are collected automatically with no per-service config.
#
# Setup:
#   # Store the collector config as a Swarm config object (once per swarm)
#   docker config create zharp_collector_config ./collector-config.yaml
#
#   # Deploy (set your API key in the environment before running)
#   ZHARP_API_KEY=your_api_key docker stack deploy -c docker-stack.yml zharp
#
# To update the config:
#   docker config rm zharp_collector_config
#   docker config create zharp_collector_config ./collector-config.yaml
#   docker service update --force zharp_collector

version: "3.9"

services:
  collector:
    image: ghcr.io/byteinbox/zharp-logs-collector:latest
    deploy:
      mode: global          # exactly one container per node
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    environment:
      ZHARP_API_KEY: ${ZHARP_API_KEY}
    configs:
      - source: zharp_collector_config
        target: /etc/zharp-collector/config.yaml
        mode: 0444
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/hostfs:ro
    ports:
      # host mode: port binds on the node directly, not load-balanced across nodes
      # apps on the same node use localhost:4317 to send OTLP
      - target: 4317
        published: 4317
        mode: host
      - target: 4318
        published: 4318
        mode: host
      - target: 13133
        published: 13133
        mode: host

configs:
  zharp_collector_config:
    external: true
