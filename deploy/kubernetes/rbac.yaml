apiVersion: v1
kind: ServiceAccount
metadata:
  name: zharp-collector
  namespace: zharp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zharp-collector
rules:
  # Required by hostmetricsreceiver to read /proc and node-level stats
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/stats
      - nodes/proxy
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zharp-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: zharp-collector
subjects:
  - kind: ServiceAccount
    name: zharp-collector
    namespace: zharp-system
