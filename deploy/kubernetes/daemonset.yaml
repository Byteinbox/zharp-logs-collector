apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zharp-collector
  namespace: zharp-system
  labels:
    app: zharp-collector
spec:
  selector:
    matchLabels:
      app: zharp-collector
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: zharp-collector
    spec:
      serviceAccountName: zharp-collector
      # Required to access host /proc for hostmetrics
      hostPID: false
      hostNetwork: false
      tolerations:
        # Run on control-plane nodes too so logs aren't missed
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: collector
          image: ghcr.io/byteinbox/zharp-logs-collector:latest
          imagePullPolicy: Always
          args:
            - --config=/etc/zharp-collector/config.yaml
          env:
            - name: ZHARP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: zharp-collector-secret
                  key: endpoint
            - name: ZHARP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zharp-collector-secret
                  key: api-key
            # Expose node name for resourcedetection k8snode detector
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: health
              containerPort: 13133
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/zharp-collector
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            # hostfs lets hostmetricsreceiver read /proc via root_path
            - name: hostfs
              mountPath: /hostfs
              readOnly: true
              mountPropagation: HostToContainer
      volumes:
        - name: config
          configMap:
            name: zharp-collector-config
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: hostfs
          hostPath:
            path: /
---
# Headless service so pods on the same node can send OTLP to the DaemonSet pod
apiVersion: v1
kind: Service
metadata:
  name: zharp-collector
  namespace: zharp-system
spec:
  clusterIP: None
  selector:
    app: zharp-collector
  ports:
    - name: otlp-grpc
      port: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      protocol: TCP
